<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBTU Study Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
:root{--bg:#07070f;--surface:#0f0f1a;--card:#151522;--border:#222235;--text:#e8e8f2;--muted:#5a5a7a;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:4rem}
/* NAV */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(7,7,15,.92);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--muted);letter-spacing:2px}
.logo span{color:#e8e8f2}
.subject-tabs{display:flex;gap:.4rem}
.stab{font-family:'Space Mono',monospace;font-size:.72rem;padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:1px}
.stab.active{color:#fff;border-color:var(--sa-color)}
/* HERO */
.hero{max-width:900px;margin:2.5rem auto 2rem;padding:0 1.5rem;text-align:center}
.subject-badge{display:inline-flex;align-items:center;gap:.5rem;padding:6px 16px;border-radius:999px;font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.2rem;border:1px solid}
h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:.6rem}
h1 em{font-style:normal}
.desc{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.meta-row{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap}
.meta-item .num{font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700}
.meta-item .lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
/* WEEK LABEL */
.container{max-width:900px;margin:0 auto;padding:0 1.5rem}
.week-sep{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin:2.5rem 0 1rem;padding:0 0 0 10px;border-left:3px solid var(--sa-color)}
/* DAY CARD */
.day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.8rem;overflow:hidden;transition:border-color .2s}
.day-card:hover{border-color:var(--sa-color)}
.day-card.done{opacity:.4}
.day-header{display:flex;align-items:center;gap:1rem;padding:.9rem 1.2rem;cursor:pointer;user-select:none}
.day-num{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--sa-color);background:rgba(255,255,255,.04);border:1px solid var(--sa-color-dim);border-radius:6px;padding:3px 8px;min-width:52px;text-align:center;flex-shrink:0}
.day-info{flex:1}
.day-title{font-size:.95rem;font-weight:600}
.chips{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.25rem}
.chip{font-size:.62rem;padding:2px 8px;border-radius:999px;font-weight:400}
.chip-t{background:rgba(124,106,247,.12);color:#a89ef7;border:1px solid rgba(124,106,247,.25)}
.chip-p{background:rgba(247,198,106,.12);color:#f7c66a;border:1px solid rgba(247,198,106,.25)}
.chip-q{background:rgba(106,247,198,.12);color:#6af7c6;border:1px solid rgba(106,247,198,.25)}
.chip-e{background:rgba(247,106,106,.12);color:#f79e9e;border:1px solid rgba(247,106,106,.25)}
.chevron{color:var(--muted);font-size:.75rem;transition:transform .2s;flex-shrink:0}
.day-card.open .chevron{transform:rotate(180deg)}
/* DAY BODY */
.day-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border)}
.day-card.open .day-body{display:block}
.sec-label{font-family:'Space Mono',monospace;font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:1rem 0 .5rem}
.goals-list{list-style:none;display:flex;flex-direction:column;gap:.35rem}
.goals-list li{display:flex;align-items:flex-start;gap:.5rem;font-size:.88rem;line-height:1.5}
.goals-list li::before{content:'→';color:var(--sa-color);font-family:'Space Mono',monospace;flex-shrink:0}
/* TERMS TABLE */
.terms-grid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
@media(max-width:600px){.terms-grid{grid-template-columns:1fr}}
.term-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:.4rem .7rem;font-size:.8rem}
.term-en{color:var(--text)}
.term-ru{color:var(--sa-color);font-family:'Space Mono',monospace;font-size:.72rem;text-align:right}
/* PROMPT BOX */
.prompt-wrap{position:relative}
.prompt-box{background:#080810;border:1px solid var(--sa-color);border-radius:8px;padding:1rem 3.5rem 1rem 1rem;font-family:'Space Mono',monospace;font-size:.76rem;line-height:1.75;color:#c8c8e8;white-space:pre-wrap;word-break:break-word}
.copy-btn{position:absolute;top:.6rem;right:.6rem;background:rgba(255,255,255,.06);border:1px solid var(--sa-color-dim);color:var(--sa-color);font-family:'Space Mono',monospace;font-size:.62rem;padding:4px 9px;border-radius:5px;cursor:pointer;transition:all .2s}
.copy-btn:hover{background:var(--sa-color-dim)}
.copy-btn.ok{color:#6af7c6;border-color:#6af7c6}
/* QUIZ */
.quiz-block{margin-top:0}
.quiz-q{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;margin-bottom:.6rem}
.quiz-q .q-text{font-size:.85rem;margin-bottom:.6rem;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:.3rem}
.q-opt{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:.45rem .7rem;cursor:pointer;font-size:.82rem;transition:all .15s}
.q-opt:hover{border-color:var(--sa-color-dim)}
.q-opt.correct{background:rgba(106,247,198,.1);border-color:#6af7c6;color:#6af7c6}
.q-opt.wrong{background:rgba(247,106,106,.1);border-color:#f76a6a;color:#f79e9e}
.q-opt.reveal{background:rgba(106,247,198,.06);border-color:#6af7c6;color:#6af7c6}
.q-opt-letter{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);flex-shrink:0}
/* ACTION ROW */
.action-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:.78rem;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--sa-color);color:var(--sa-color)}
.btn-done{border-color:rgba(106,247,198,.3);color:#6af7c6}
/* HIDDEN SUBJECT SECTIONS */
.subject-section{display:none}
.subject-section.active{display:block}
/* FOOTER */
footer{text-align:center;color:var(--muted);font-size:.72rem;font-family:'Space Mono',monospace;margin-top:3rem}
</style>
</head>
<body>

  <div class="logo">KBTU · <span>Study Portal</span></div>

// ─── RENDER ──────────────────────────────────────────────────────────
let currentSubject = 0;

function renderNav(){
  const tabs = document.getElementById('subjectTabs');
  tabs.innerHTML = SUBJECTS.map((s,i)=>`
    <button class="stab ${i===currentSubject?'active':''}"
      style="--sa-color:${s.color}"
      onclick="switchSubject(${i})">${s.icon} ${s.name}</button>
  `).join('');
}

function switchSubject(i){
  currentSubject = i;
  renderNav();
  renderApp();
}

function renderApp(){
  const s = SUBJECTS[currentSubject];
  document.documentElement.style.setProperty('--sa-color', s.color);
  document.documentElement.style.setProperty('--sa-color-dim', s.colorDim);

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="hero">
      <div class="subject-badge" style="color:${s.color};border-color:${s.colorDim};background:${s.colorDim}">
        ${s.icon} ${s.name.toUpperCase()}
      </div>
      <h1>14-Day <em style="color:${s.color}">Exam Prep</em><br>Study Plan</h1>
      <p class="desc">${s.desc}</p>
      <div class="meta-row">
        ${s.stats.map(m=>`<div class="meta-item"><div class="num" style="color:${s.color}">${m.n}</div><div class="lbl">${m.l}</div></div>`).join('')}
      </div>
    </div>
    <div class="container">
      ${s.weeks.map(w=>`
        <div class="week-sep">${w.label}</div>
        ${w.days.map(d=>renderDay(d,s)).join('')}
      `).join('')}
    </div>
  `;
}

function renderDay(d, s){
  const chipMap = {theory:'chip-t',practice:'chip-p',review:'chip-q',quiz:'chip-q',exam:'chip-e'};
  const chipLabels = {theory:'Теория',practice:'Практика',review:'Повторение',quiz:'Квиз',exam:'Экзамен'};
  const chipsHtml = d.chips.map(c=>`<span class="chip ${chipMap[c]||'chip-t'}">${chipLabels[c]||c}</span>`).join('');

  const termsHtml = d.terms.length ? `
    <div class="sec-label">Ключевые термины</div>
    <div class="terms-grid">
      ${d.terms.map(t=>`<div class="term-row"><span class="term-en">${t.en}</span><span class="term-ru">${t.ru}</span></div>`).join('')}
    </div>
  ` : '';

  const quizHtml = d.quiz && d.quiz.length ? `
    <div class="sec-label">Мини-квиз (${d.quiz.length} вопроса)</div>
    <div class="quiz-block">
      ${d.quiz.map((q,qi)=>`
        <div class="quiz-q" id="qq_${s.id}_${d.n}_${qi}">
          <div class="q-text">${qi+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o,oi)=>`
              <div class="q-opt" onclick="answerQ('${s.id}',${d.n},${qi},${oi},${q.ans})">
                <span class="q-opt-letter">${['A','B','C','D'][oi]}</span>
                <span>${o}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="day-card" id="day_${s.id}_${d.n}">
      <div class="day-header" onclick="toggleDay('${s.id}',${d.n})">
        <div class="day-num">DAY ${String(d.n).padStart(2,'0')}</div>
        <div class="day-info">
          <div class="day-title">${d.title}</div>
          <div class="chips">${chipsHtml}</div>
        </div>
        <div class="chevron">▼</div>
      </div>
      <div class="day-body">
        <div class="sec-label">Цели дня</div>
        <ul class="goals-list">${d.goals.map(g=>`<li>${g}</li>`).join('')}</ul>
        ${termsHtml}
        <div class="sec-label">Промпт — скопируй и отправь Claude</div>
        <div class="prompt-wrap">
          <div class="prompt-box" id="pb_${s.id}_${d.n}">${d.prompt}</div>
          <button class="copy-btn" onclick="copyPrompt('${s.id}',${d.n},this)">COPY</button>
        </div>
        ${quizHtml}
        <div class="action-row">
          <button class="btn-sm btn-done" onclick="markDone('${s.id}',${d.n})">✓ Выполнено</button>
        </div>
      </div>
    </div>
  `;
}

function toggleDay(sid, n){
  const el = document.getElementById(`day_${sid}_${n}`);
  el.classList.toggle('open');
}

function copyPrompt(sid, n, btn){
  const box = document.getElementById(`pb_${sid}_${n}`);
  navigator.clipboard.writeText(box.innerText).then(()=>{
    btn.textContent = 'COPIED!';
    btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('ok');},2000);
  });
}

function answerQ(sid, dn, qi, chosen, correct){
  const container = document.getElementById(`qq_${sid}_${dn}_${qi}`);
  const opts = container.querySelectorAll('.q-opt');
  opts.forEach((o,i)=>{
    o.style.pointerEvents='none';
    if(i===correct) o.classList.add(chosen===correct?'correct':'reveal');
    else if(i===chosen) o.classList.add('wrong');
  });
}

function markDone(sid, n){
  const el = document.getElementById(`day_${sid}_${n}`);
  el.classList.toggle('done');
  if(el.classList.contains('done') && el.classList.contains('open'))
    el.classList.remove('open');
}

// init
renderNav();
renderApp();
</script>
</body>
</html>
